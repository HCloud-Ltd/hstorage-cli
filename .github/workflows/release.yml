name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: hcli-linux-amd64
          - target: bun-linux-arm64
            artifact: hcli-linux-arm64
          - target: bun-darwin-x64
            artifact: hcli-darwin-amd64
          - target: bun-darwin-arm64
            artifact: hcli-darwin-arm64
          - target: bun-windows-x64
            artifact: hcli-windows-amd64.exe
          - target: bun-windows-arm64
            artifact: hcli-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build
        run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
