name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      # Required to checkout code
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: hcli-linux-amd64
          - target: bun-linux-arm64
            artifact: hcli-linux-arm64
          - target: bun-darwin-x64
            artifact: hcli-darwin-amd64
          - target: bun-darwin-arm64
            artifact: hcli-darwin-arm64
          - target: bun-windows-x64
            artifact: hcli-windows-amd64.exe
          - target: bun-windows-arm64
            artifact: hcli-windows-arm64.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true
      - run: bun install
      - name: Build
        env:
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_ARTIFACT: ${{ matrix.artifact }}
        run: bun build --compile --target="${BUILD_TARGET}" src/index.ts --outfile "${BUILD_ARTIFACT}"
      - name: Zip artifact
        env:
          BUILD_ARTIFACT: ${{ matrix.artifact }}
        run: |
          ZIP_NAME="${BUILD_ARTIFACT%.exe}.zip"
          zip "${ZIP_NAME}" "${BUILD_ARTIFACT}"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.artifact }}.zip
          path: "*.zip"

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create GitHub releases
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: artifacts/*
          generate_release_notes: true
