name: Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-slim
    env:
      OPENAPI_PATH: ${{ github.workspace }}/hstorage-api/openapi.yaml
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Checkout API spec
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: HCloud-Ltd/hstorage-api
          path: hstorage-api
          sparse-checkout: openapi.yaml
          token: ${{ secrets.API_REPO_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        env:
          HSTORAGE_EMAIL: ${{ secrets.HSTORAGE_EMAIL }}
          HSTORAGE_API_KEY: ${{ secrets.HSTORAGE_API_KEY }}
          HSTORAGE_SECRET_KEY: ${{ secrets.HSTORAGE_SECRET_KEY }}
          HSTORAGE_API_URL: https://stg-api.hstorage.io

  e2e:
    name: E2E tests
    runs-on: ubuntu-slim
    timeout-minutes: 10
    env:
      OPENAPI_PATH: ${{ github.workspace }}/hstorage-api/openapi.yaml
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Checkout API spec
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: HCloud-Ltd/hstorage-api
          path: hstorage-api
          sparse-checkout: openapi.yaml
          token: ${{ secrets.API_REPO_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install

      - name: Run E2E tests
        run: bun test test/e2e-real/
        env:
          HSTORAGE_EMAIL: ${{ secrets.HSTORAGE_EMAIL }}
          HSTORAGE_API_KEY: ${{ secrets.HSTORAGE_API_KEY }}
          HSTORAGE_SECRET_KEY: ${{ secrets.HSTORAGE_SECRET_KEY }}
          HSTORAGE_API_URL: https://stg-api.hstorage.io
