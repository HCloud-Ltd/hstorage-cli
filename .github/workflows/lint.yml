name: Lint

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/**"
      - "markdown/**"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAPI_PATH: ${{ github.workspace }}/hstorage-api/openapi.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Checkout API spec
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: HCloud-Ltd/hstorage-api
          path: hstorage-api
          sparse-checkout: openapi.yaml
          token: ${{ secrets.API_REPO_TOKEN }}

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate types from OpenAPI spec
        run: bun run generate:types

      - name: TypeScript type check
        run: bunx tsc --noEmit
